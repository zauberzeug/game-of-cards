# CI workflow — smoke-tests the package on every push and pull-request.
#
# Confirms:
#   - Package builds cleanly with hatchling
#   - `goc --version` reports correctly via the console-script entry point
#   - `goc validate` passes on the repo's own deck (once a deck exists)
#   - All 11 skill templates ship as importable package data
#
# Once `goc-install-command-scaffolds-repo` (sub-card 2) ships and the
# repo's own `deck/` directory contains cards, the `goc validate` step
# becomes the gate that keeps card frontmatter consistent.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Build + import + validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: uv pip install -e .

      - name: Verify console script
        run: |
          goc --version
          goc --help | head -5

      - name: Run regression tests
        run: uv run python -m unittest discover -s tests

      - name: Verify package data ships templates
        run: |
          uv run python -c "
          import pathlib
          from importlib.resources import files
          root = files('goc.templates')
          source_skills = sorted(p.name for p in pathlib.Path('goc/templates/skills').iterdir() if (p / 'SKILL.md').is_file())
          for s in source_skills:
              skill_md = root / 'skills' / s / 'SKILL.md'
              assert skill_md.is_file(), f'missing {skill_md}'
              print(f'  ✓ {s}/SKILL.md')
          schema = files('goc') / 'schema.yaml'
          assert schema.is_file(), 'missing schema.yaml'
          print('  ✓ schema.yaml')
          print(f'\nAll {len(source_skills)} skills + schema ship as package data.')
          "

      - name: Verify plugin version lockstep
        run: |
          uv run python -c "
          import json, pathlib, re, sys
          pyproject_text = pathlib.Path('pyproject.toml').read_text()
          match = re.search(r'^version = \"([^\"]+)\"', pyproject_text, re.MULTILINE)
          assert match, 'no version line in pyproject.toml'
          pyproject = match.group(1)
          plugin = json.loads(pathlib.Path('claude-plugin/.claude-plugin/plugin.json').read_text())['version']
          marketplace = json.loads(pathlib.Path('.claude-plugin/marketplace.json').read_text())['metadata']['version']
          versions = {'pyproject.toml': pyproject, 'claude-plugin/plugin.json': plugin, '.claude-plugin/marketplace.json metadata': marketplace}
          if len(set(versions.values())) != 1:
              for k, v in versions.items():
                  print(f'  {k}: {v}')
              sys.exit('ERROR: version surfaces have drifted; release policy requires lockstep.')
          print(f'OK — all version surfaces report {pyproject}')
          "

      - name: Verify plugin assets match templates byte-for-byte
        run: |
          uv run python -c "
          import filecmp, pathlib, sys
          pairs = [
              ('goc/templates/skills', 'claude-plugin/skills'),
              ('goc/templates/hooks/deck_prompt_router.py', 'claude-plugin/hooks/deck_prompt_router.py'),
              ('goc/templates/hooks/deck_session_start.py', 'claude-plugin/hooks/deck_session_start.py'),
              ('goc', 'claude-plugin/goc'),
          ]
          drift = []
          for src, dst in pairs:
              s, d = pathlib.Path(src), pathlib.Path(dst)
              if s.is_dir():
                  cmp = filecmp.dircmp(s, d)
                  def walk(c, prefix=''):
                      out = []
                      out += [f'{prefix}{n} (only in {src})' for n in c.left_only]
                      out += [f'{prefix}{n} (only in {dst})' for n in c.right_only]
                      out += [f'{prefix}{n} (differs)' for n in c.diff_files]
                      for sub_name, sub in c.subdirs.items():
                          out += walk(sub, prefix + sub_name + '/')
                      return out
                  diffs = walk(cmp)
                  if diffs:
                      drift.append((src, dst, diffs))
              else:
                  if not filecmp.cmp(s, d, shallow=False):
                      drift.append((src, dst, ['contents differ']))
          if drift:
              for src, dst, diffs in drift:
                  print(f'DRIFT: {src} vs {dst}')
                  for d in diffs:
                      print(f'  - {d}')
              sys.exit('ERROR: claude-plugin assets diverged from goc/templates. Re-sync the duplicated files.')
          print('OK — claude-plugin assets match goc/templates byte-for-byte.')
          "

      - name: Validate deck (if exists)
        run: |
          if [ -d deck ]; then
            goc validate
          else
            echo "No deck/ directory yet — skipping validation."
            echo "(once goc install scaffolds the repo, this step becomes load-bearing)"
          fi
