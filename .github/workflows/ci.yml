# CI workflow — smoke-tests the package on every push and pull-request.
#
# Confirms:
#   - Package builds cleanly with hatchling
#   - `goc --version` reports correctly via the console-script entry point
#   - `goc validate` passes on the repo's own deck (once a deck exists)
#   - All 11 skill templates ship as importable package data
#
# Once `goc-install-command-scaffolds-repo` (sub-card 2) ships and the
# repo's own `deck/` directory contains cards, the `goc validate` step
# becomes the gate that keeps card frontmatter consistent.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Build + import + validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          # `pyproject.toml` declares `dynamic = ["version"]` via hatch-vcs;
          # the install path needs full git history + tags to resolve a
          # version. (Without this, `uv pip install -e .` fails to compute
          # a wheel version on a shallow checkout.)
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: uv pip install -e .

      - name: Verify console script
        run: |
          goc --version
          goc --help | head -5

      - name: Run regression tests
        run: uv run python -m unittest discover -s tests

      - name: Verify package data ships templates
        run: |
          uv run python -c "
          import pathlib
          from importlib.resources import files
          root = files('goc.templates')
          source_skills = sorted(p.name for p in pathlib.Path('goc/templates/skills').iterdir() if (p / 'SKILL.md').is_file())
          for s in source_skills:
              skill_md = root / 'skills' / s / 'SKILL.md'
              assert skill_md.is_file(), f'missing {skill_md}'
              print(f'  ✓ {s}/SKILL.md')
          schema = files('goc') / 'schema.yaml'
          assert schema.is_file(), 'missing schema.yaml'
          print('  ✓ schema.yaml')
          print(f'\nAll {len(source_skills)} skills + schema ship as package data.')
          "

      # Internal-lockstep check: every static version literal in the source
      # tree must agree with `goc/__init__.py`'s `__version__`. The release
      # workflow rewrites all of them from the git tag at build time, so
      # between releases they should all match the last released literal.
      # (The full assertion lives in tests/test_version_surfaces.py — invoked
      # as part of the regression-tests step above; this comment documents
      # the policy.)

      - name: Verify plugin assets match goc/ byte-for-byte
        run: uv run python scripts/sync_plugin_assets.py --check

      - name: Validate deck (if exists)
        run: |
          if [ -d deck ]; then
            goc validate
          else
            echo "No deck/ directory yet — skipping validation."
            echo "(once goc install scaffolds the repo, this step becomes load-bearing)"
          fi
