# Run one Game of Cards autonomous worker pass from GitHub Actions.
#
# Required repository secret:
#   CLAUDE_CODE_OAUTH_TOKEN  (provisioned by the Claude GitHub App)

name: Pull Card

on:
  schedule:
    # Run one autonomous worker pass every 30 minutes.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: pull-card-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pull-card:
    name: Run pull-card skill
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Prepare Python environment
        run: uv sync

      - name: Check autonomous queue
        id: queue
        run: |
          count="$(uv run goc --status open --human-gate none --json | jq 'length')"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Pullable cards (status=open, human_gate=none): $count"
          if [ "$count" -eq 0 ]; then
            echo "::notice::Queue is empty — skipping the LLM agent step to save tokens."
          fi

      - name: Pull one GoC card
        if: steps.queue.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            Run Skill(pull-card) once in this repository.

            This repository is the source tree for the `goc` package. Translate every bare `goc ...` command in the skill guidance to `uv run goc ...` while working here.

            Work only the highest-leverage open card with `human_gate: none`. If the queue is empty, follow the skill's queue-empty behavior.

            Follow CLAUDE.md and AGENTS.md. Commit and push only the files needed for the card you complete or park.
          claude_args: |
            --max-turns 200
            --permission-mode bypassPermissions
