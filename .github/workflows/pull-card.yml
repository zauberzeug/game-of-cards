# Drain the Game of Cards autonomous queue from GitHub Actions.
#
# Each run pulls cards repeatedly until no `human_gate: none` open
# cards remain (or the agent can no longer make progress).
#
# Required repository secret:
#   CLAUDE_CODE_OAUTH_TOKEN  (provisioned by the Claude GitHub App)

name: Pull Card

on:
  schedule:
    # Drain the autonomous queue once an hour.
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: pull-card-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pull-card:
    name: Drain pull-card queue
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Prepare Python environment
        run: uv sync

      - name: Check autonomous queue
        id: queue
        run: |
          count="$(uv run goc --status open --human-gate none --json | jq 'length')"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Pullable cards (status=open, human_gate=none): $count"
          if [ "$count" -eq 0 ]; then
            echo "::notice::Queue is empty — skipping the LLM agent step to save tokens."
          fi

      - name: Drain GoC queue
        if: steps.queue.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            Drain the autonomous queue in this repository.

            Run Skill(pull-card). When it returns, re-check the queue:

                uv run goc --status open --human-gate none --json | jq 'length'

            If the count is non-zero, run Skill(pull-card) again. Repeat
            until the count is zero, or until you can no longer make
            progress on any remaining card (e.g. every remaining card
            raised its own gate to `decision`/`session`, a fix failed
            verification, or pre-commit refuses).

            This repository is the source tree for the `goc` package.
            Translate every bare `goc ...` command in skill guidance to
            `uv run goc ...` while working here.

            Pull only `human_gate: none` open cards — cards that raise
            their gate during their own session leave the drain set
            naturally.

            Follow CLAUDE.md and AGENTS.md. Commit and push the files
            for each card as you complete or park it; do not batch
            commits across cards.
          claude_args: |
            --max-turns 500
            --permission-mode bypassPermissions
