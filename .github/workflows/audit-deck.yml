# Feed the Game of Cards queue from GitHub Actions.
#
# Each run invokes Skill(audit-deck), which hunts the codebase for one
# previously-undocumented defect (bug, doc drift, derivation gap,
# architectural ugliness) and files it as a new card. The hourly
# pull-card workflow then drains it.
#
# Required repository secret:
#   CLAUDE_CODE_OAUTH_TOKEN  (provisioned by the Claude GitHub App)

name: Audit Deck

on:
  schedule:
    # Run one audit-deck pass every day at 02:00 UTC.
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: audit-deck-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit-deck:
    name: Run audit-deck skill
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Prepare Python environment
        run: uv sync

      - name: File one audit card
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            Run Skill(audit-deck) once in this repository.

            File one new card from emergent codebase observations.
            Follow the skill body verbatim — it handles its own
            disproved-dedup, sibling sweep, park-or-disprove rule,
            and commit step (Phase 4).

            This repository is the source tree for the `goc` package.
            Translate every bare `goc ...` command in skill guidance
            to `uv run goc ...` while working here.

            You are running in a cloud runner with no human in the
            loop. Do not raise gates to `decision`/`session` for
            taste calls — file the card at `human_gate: none` with
            your best evidence-anchored framing. The next reader can
            still raise the gate after the fact.

            Follow CLAUDE.md and AGENTS.md.
          claude_args: |
            --max-turns 200
            --permission-mode bypassPermissions
