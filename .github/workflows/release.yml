# Release workflow — publishes `game-of-cards` to PyPI, npm, and ClawHub
# via OIDC trusted publishing.
#
# Authentication: OIDC trusted publishing on every channel — no long-lived
# tokens in repo secrets. Each publish target is a one-time web-UI/CLI
# configuration that authorizes this workflow to mint short-lived publish
# tokens via the GitHub Actions id-token.
#
# Auth setup (one-time per registry):
#
#   PyPI (OIDC trusted publisher):
#     https://pypi.org/manage/project/game-of-cards/settings/publishing/
#     Owner: zauberzeug · Repo: game-of-cards · Workflow: release.yml · Env: pypi
#
#   npm (OIDC trusted publisher):
#     https://www.npmjs.com/package/game-of-cards/access
#     Owner: zauberzeug · Repo: game-of-cards · Workflow: release.yml · Env: npm
#
#   ClawHub (stored token, NOT trusted publisher):
#     CLAWHUB_TOKEN secret set in repo settings, value = output of
#     `jq -r .token "$HOME/Library/Application Support/clawhub/config.json"`
#     after `clawhub login`. The token authenticates the publish on
#     `push` events (OIDC trusted publishing on ClawHub refuses push
#     and only accepts workflow_dispatch — so the token unlocks the
#     single-trigger flow). Rotate by re-running `clawhub login` and
#     re-piping the new token into `gh secret set CLAWHUB_TOKEN`.
#
# Tag convention: `v0.1.0`, `v0.2.3`, `v1.0.0`, etc. The tag IS the version —
# everything else is derived from it at build time.
#
# Canonical release flow (single trigger, no manual bumps):
#
#   1. `git tag vX.Y.Z && git push origin vX.Y.Z`.
#      → tag-push triggers PyPI + npm (OIDC) + ClawHub (token) in parallel.
#
# How the version flows from the tag:
#   - The wheel version (`pyproject.toml`) is dynamic via `hatch-vcs`,
#     which reads `git describe --tags` at build time.
#   - `goc/__init__.py`'s `__version__` literal and the four plugin
#     manifests (`openclaw-plugin/package.json` + `package-lock.json`,
#     `claude-plugin/.claude-plugin/plugin.json`, `.claude-plugin/marketplace.json`)
#     are rewritten at build time by `scripts/release_rewrite_versions.py`
#     using the tag value. `scripts/sync_plugin_assets.py` then mirrors
#     the rewritten `__version__` into `claude-plugin/goc/` and
#     `openclaw-plugin/goc/` byte-for-byte.
#   - Humans never edit version literals. A tagged commit that touches
#     any of those files trips the in-job tripwire and fails the build.
#
# ClawHub caveat: the ClawHub publish reusable workflow checks out the
# tagged commit and publishes `openclaw-plugin/` from that commit's
# `package.json`. Because the tagged commit (per the policy above)
# carries the *previous* release's version literal, the package.json on
# disk at publish time is stale relative to the tag. Track this in the
# `version-rewrite-must-also-cover-clawhub-publish-source` follow-up
# card; resolution will likely require either an upstream input on the
# reusable workflow or a side-channel pre-publish rewrite.
#
# Other dispatch modes:
#   - `gh workflow run release.yml --field dry_run=true` —
#     exercises rewrite + sync + build + smoke + dry-run publishes.
#     A static synthetic version (`0.99.0`) is used for the rewrite.
#   - `gh workflow run release.yml --ref vX.Y.Z` —
#     re-runs publish for an existing tag (useful if a publish job
#     transient-failed during the original push).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + smoke only; do not publish'
        type: boolean
        default: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # hatch-vcs reads `git describe --tags`; fetch full history + tags.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Set up Node (npm install used to validate the lockfile rewrite)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compute release version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF#refs/tags/v}"
            mode=tag
          elif [[ "${{ inputs.dry_run }}" == "true" ]]; then
            # A static synthetic version that is valid PEP 440 AND valid semver
            # so the rewrite + uv build + npm install paths exercise the same
            # code as a real release without needing a real tag.
            release_version="0.99.0"
            mode=dry_run
          else
            echo "release.yml dispatched on a non-tag ref without dry_run; nothing to publish."
            exit 1
          fi
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Release version: $release_version (mode: $mode)"

      - name: Tripwire — tagged commit must not edit version literals
        # The workflow IS the version writer. If a human re-introduces a manual
        # bump-and-tag commit, fail loudly so the policy stays enforced.
        if: ${{ steps.version.outputs.mode == 'tag' }}
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            tracked='goc/__init__.py openclaw-plugin/package.json openclaw-plugin/package-lock.json claude-plugin/.claude-plugin/plugin.json .claude-plugin/marketplace.json'
            diff=$(git diff --name-only HEAD~1 HEAD -- $tracked)
            if [ -n "$diff" ]; then
              echo "ERROR: tagged commit modifies version literals — the workflow is the version writer."
              echo "Files touched in $(git rev-parse --short HEAD):"
              echo "$diff" | sed 's/^/  /'
              echo "Re-tag a parent commit, or revert the literal edits."
              exit 1
            fi
          fi
          echo "OK — tagged commit leaves version literals alone."

      - name: Rewrite version literals from tag
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: python3 scripts/release_rewrite_versions.py "$RELEASE_VERSION"

      - name: Sync plugin asset mirrors after rewrite
        # Propagates the new __version__ literal into claude-plugin/goc/ and
        # openclaw-plugin/goc/ via the same byte-mirror used by pre-commit.
        run: python3 scripts/sync_plugin_assets.py

      - name: Validate npm lockfile is internally consistent
        # If the regex rewrite of package-lock.json got out of sync with
        # package.json, `npm install --package-lock-only` would update the
        # lockfile here — which `npm ci` in publish-npm would then reject.
        # Surface that failure in the build job instead of two jobs later.
        #
        # `--ignore-scripts` is required: npm runs the `prepare` lifecycle
        # script (`npm run build` → `tsc`) even under `--package-lock-only`,
        # and tsc fails on a missing `@types/node` because the flag also
        # prevents an actual install. The validation is purely a lockfile
        # consistency check, so suppressing scripts is correct.
        working-directory: openclaw-plugin
        run: npm install --package-lock-only --no-audit --no-fund --ignore-scripts

      - name: Build distribution
        env:
          # The rewrite + sync steps above leave the working tree dirty
          # relative to HEAD, so hatch-vcs's `no-guess-dev` scheme would
          # emit `X.Y.Z.post1.dev0` instead of the bare tag. Pin the
          # wheel version explicitly via setuptools_scm's pretend env var
          # — works for both the tag-push and dry-run paths and is not
          # affected by tree dirtiness.
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          uv build
          ls -la dist/

      - name: Assert wheel version matches release version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          shopt -s nullglob
          wheels=(dist/game_of_cards-*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "ERROR: expected exactly one wheel in dist/, found ${#wheels[@]}"
            ls -la dist/ || true
            exit 1
          fi
          wheel="${wheels[0]##*/}"
          # game_of_cards-X.Y.Z-py3-none-any.whl
          actual=$(echo "$wheel" | sed -E 's/^game_of_cards-([^-]+)-py3-none-any\.whl$/\1/')
          if [ "$actual" != "$RELEASE_VERSION" ]; then
            echo "ERROR: wheel version $actual does not match release version $RELEASE_VERSION"
            exit 1
          fi
          echo "OK — wheel reports version $actual"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  smoke:
    # End-to-end smoke test that gates publishes on the plugin actually
    # working in a fresh consumer environment. Reuses the same Claude Code
    # OAuth surface as pull-card.yml — no new secrets required.
    #
    # Path A: pre-installs goc + grants Bash(goc:*); asserts Skill(kickoff)
    #   completes and creates .game-of-cards/deck/.
    # Path B: no goc install + no Bash(goc:*) allowance; asserts the LLM
    #   correctly routes from Skill(audit-deck) to Skill(kickoff) and
    #   that kickoff surfaces the verbatim remediation text.
    name: End-to-end auto-bootstrap smoke
    needs: build
    runs-on: ubuntu-latest
    # `anthropics/claude-code-action@v1` rejects the `push` event family
    # ("Unsupported event type: push"), so smoke can only run under
    # workflow_dispatch. Tag-push releases skip smoke; the publish jobs
    # below tolerate that via an explicit `needs.smoke.result == 'skipped'`
    # branch in their `if`. To exercise smoke against a tag, use
    # `gh workflow run release.yml --ref vX.Y.Z`.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Path A pre-install of goc)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Pre-install goc CLI for Path A
        run: |
          uv tool install --force "${{ github.workspace }}"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Path A workspace
        run: |
          rm -rf /tmp/smoke-A && mkdir -p /tmp/smoke-A
          ( cd /tmp/smoke-A && git init -q -b main )

      - name: Path A — kickoff completes against fresh repo
        id: smoke_a
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path A. The test directory `/tmp/smoke-A` has
            ALREADY been created as an empty git repo by the workflow.
            Do NOT re-create it.

            Each Bash tool call runs in a fresh shell — `cd` does not
            persist between calls. For every command that must run inside
            the test repo, prefix it: `cd /tmp/smoke-A && <command>`.

            1. Invoke `Skill(audit-deck)`. Its preflight section will tell
               you to invoke `Skill(kickoff)` because the deck doesn't exist.
            2. Run `Skill(kickoff)` to completion. `goc` is on PATH for
               this run. Kickoff should run `cd /tmp/smoke-A && goc install`
               and create `/tmp/smoke-A/.game-of-cards/deck/`.
            3. Verify `/tmp/smoke-A/.game-of-cards/deck/` exists, then write
               the literal string `A:passed` to `/tmp/smoke-A/result.txt`.
               Exit afterward.

            Do not run additional cards, do not queue work, do not generalize.
            The only goal is to prove kickoff succeeds end-to-end.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Edit,Bash,Skill(kickoff),Skill(audit-deck)"
            --max-turns 30

      - name: Assert Path A
        run: |
          test -d /tmp/smoke-A/.game-of-cards/deck \
            || { echo "FAIL Path A: .game-of-cards/deck/ not created"; exit 1; }
          grep -q '^A:passed' /tmp/smoke-A/result.txt \
            || { echo "FAIL Path A: result.txt missing or wrong"; cat /tmp/smoke-A/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path A passed"

      - name: Set up Path B workspace
        run: |
          rm -rf /tmp/smoke-B && mkdir -p /tmp/smoke-B
          ( cd /tmp/smoke-B && git init -q -b main )

      - name: Path B — preflight routes to kickoff when goc is not allowed
        id: smoke_b
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path B. Test directory `/tmp/smoke-B` is ALREADY
            an empty git repo (created by the workflow). Do NOT re-create it.

            `goc` invocations are intentionally NOT in the allowlist for this
            run, simulating a fresh consumer install where `Bash(goc:*)` has
            not yet been granted.

            1. Invoke `Skill(audit-deck)`. Its `!`-blocks calling `goc` will
               be denied at render time; the skill's preflight section
               instructs you to invoke `Skill(kickoff)` in response.
            2. Run `Skill(kickoff)`. It should detect the missing
               `Bash(goc:*)` rule and surface verbatim remediation text
               telling the user to add it to `~/.claude/settings.json`.
            3. After confirming that kickoff's response contains the
               literal substring `Bash(goc:*)` AND the literal substring
               `permissions.allow`, write the literal string `B:passed`
               to `/tmp/smoke-B/result.txt`. Use the Write tool, not Bash.

            Do NOT attempt to install goc, modify settings, or run goc.
            The only goal is to prove the routing fires and the remediation
            text is emitted.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Bash(cat:*),Bash(ls:*),Skill(kickoff),Skill(audit-deck)"
            --max-turns 20

      - name: Assert Path B
        run: |
          grep -q '^B:passed' /tmp/smoke-B/result.txt \
            || { echo "FAIL Path B: result.txt missing or wrong"; cat /tmp/smoke-B/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path B passed"

  publish-pypi:
    name: Publish to PyPI
    needs: [build, smoke]
    runs-on: ubuntu-latest
    # `always()` keeps this from being auto-skipped when `smoke` is
    # skipped (the tag-push path). The explicit result checks then
    # require build to succeed and smoke to either succeed or be
    # skipped — never to have failed.
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    environment:
      name: pypi
      url: https://pypi.org/project/game-of-cards/
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` field — uses OIDC trusted publishing.
          # Print upload metadata for the workflow log.
          print-hash: true
          verbose: true

  publish-npm:
    name: Publish to npm
    needs: [build, smoke]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    environment:
      name: npm
      url: https://www.npmjs.com/package/game-of-cards
    permissions:
      id-token: write  # OIDC for npm trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Rewrite version literals from tag
        # publish-npm is a separate job from `build` and gets its own clean
        # checkout — the rewrites the build job made do not carry over here.
        # Re-derive the release version from the tag (deterministic input)
        # and re-run the same script the build job used.
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          python3 scripts/release_rewrite_versions.py "$tag_version"

      - name: Install plugin deps
        working-directory: openclaw-plugin
        run: npm ci

      - name: Build dist
        working-directory: openclaw-plugin
        run: npm run build

      - name: Publish to npm with provenance
        working-directory: openclaw-plugin
        run: npm publish --provenance --access public

  publish-clawhub:
    # ClawHub publish via the official reusable workflow. Authenticates
    # with a stored CLAWHUB_TOKEN secret (created from the maintainer's
    # `clawhub login` token) so tag-push works as a single trigger for
    # all three registries.
    #
    # Trade-off vs. OIDC trusted publishing: the token is long-lived and
    # tied to whoever logged in to clawhub last. Rotate by re-running
    # `clawhub login` then `jq -r .token "<config-path>" | gh secret set
    # CLAWHUB_TOKEN`. Compromise = revoke via `clawhub auth logout` (which
    # invalidates the token server-side) then re-login + re-set the secret.
    needs: [build, smoke]
    # Run on real tag push (publish), or workflow_dispatch with
    # dry_run=true (dry-run preview). Skip workflow_dispatch with
    # dry_run=false on a non-tag ref — that would publish from main
    # HEAD which is rarely what you want.
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && ((startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == true)) }}
    permissions:
      # id-token: write is required EVEN with token auth — the reusable
      # workflow uses OIDC internally (audience: clawhub-workflow-source)
      # to verify itself before any publish path. Without this, the
      # workflow fails at startup.
      id-token: write
      contents: read
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.12.3
    with:
      # `source_path` (not `source: ./openclaw-plugin`) — server-side check
      # "Trusted publish source ref must match the verified GitHub ref"
      # rejects local-folder source strings. With source_path, source
      # defaults to GITHUB_REPOSITORY@github.sha which matches the ref
      # claim. (Less critical when authenticating via token, but kept
      # for symmetry with the OIDC-mode fallback.)
      source_path: openclaw-plugin
      dry_run: ${{ inputs.dry_run == true }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
