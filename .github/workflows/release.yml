# Release workflow — publishes `game-of-cards` to PyPI, npm, and ClawHub
# via OIDC trusted publishing.
#
# Authentication: OIDC trusted publishing on every channel — no long-lived
# tokens in repo secrets. Each publish target is a one-time web-UI/CLI
# configuration that authorizes this workflow to mint short-lived publish
# tokens via the GitHub Actions id-token.
#
# Auth setup (one-time per registry):
#
#   PyPI (OIDC trusted publisher):
#     https://pypi.org/manage/project/game-of-cards/settings/publishing/
#     Owner: zauberzeug · Repo: game-of-cards · Workflow: release.yml · Env: pypi
#
#   npm (OIDC trusted publisher):
#     https://www.npmjs.com/package/game-of-cards/access
#     Owner: zauberzeug · Repo: game-of-cards · Workflow: release.yml · Env: npm
#
#   ClawHub (OIDC trusted publisher, workflow_dispatch only):
#     `clawhub package trusted-publisher set game-of-cards \
#        --repository zauberzeug/game-of-cards \
#        --workflow-filename release.yml`
#     ClawHub's OIDC TP refuses `push` events and accepts only
#     `workflow_dispatch`. Under the single-trigger canonical flow
#     (see below), the workflow is entered only via workflow_dispatch,
#     so all three publishes happen in the same run.
#     Do NOT add a CLAWHUB_TOKEN secret as a fallback — the reusable
#     workflow's token-override path authenticates as a different
#     publisher than the OIDC path, and ClawHub's Convex store rejects
#     subsequent publishes with `Package already exists and belongs to
#     another publisher` because the package was registered under the
#     OIDC publisher identity.
#
# Tag convention: `v0.1.0`, `v0.2.3`, `v1.0.0`, etc. The tag IS the version —
# everything else is derived from it at build time.
#
# Canonical release flow (single workflow_dispatch event, no manual version bumps):
#
#   gh workflow run release.yml -f version=X.Y.Z
#     → workflow_dispatch on main (or wherever HEAD points).
#     → build job: rewrites version literals from the input, builds the
#       wheel + sdist, validates lockfile consistency, asserts the wheel
#       version matches the input, then commits the rewritten literals
#       back to main as `release: bump version literals to vX.Y.Z`
#       under the github-actions[bot] identity, and finally tags the
#       rewrite commit `vX.Y.Z` and pushes both.
#     → smoke job: end-to-end auto-bootstrap test.
#     → publish-pypi, publish-npm, publish-clawhub: all OIDC trusted
#       publishing, all in the same workflow_dispatch run.
#
# Why commit the rewrites back to main: three of the four publish
# channels (PyPI, npm, ClawHub) get the correct version via build
# artifacts or reusable-workflow input overrides. Claude Code's plugin
# manager is the exception — it clones the marketplace repo and reads
# `claude-plugin/.claude-plugin/plugin.json` directly from the git
# tree. Without the commit-back, that file (and the four sibling
# manifests) stayed frozen on main at whatever the *first* release
# wrote, and Claude Code users saw a stale version label forever
# after. See card `release-workflow-leaves-plugin-manifest-version-stale-on-main`.
#
# Why single-event works for ClawHub: the ClawHub reusable workflow's
# validator only checks `github.event_name == 'workflow_dispatch'` —
# there is no ref-pattern constraint, so a dispatch from `refs/heads/main`
# (with the tag created mid-run) passes the same validator that a
# dispatch from `refs/tags/vX.Y.Z` would. See
# `project_clawhub_oidc_constraints.md` for the empirical verification
# trail. The closed predecessor card
# `auto-publish-npm-and-clawhub-on-tag-push` documented a two-step flow
# because it framed the workflow_dispatch as having to come from a
# human; the single-trigger flow inverts that assumption — the workflow
# itself is the version writer AND the tag pusher AND the publish
# trigger.
#
# Recovery / republish: if a publish job fails after the tag was pushed
# (e.g., a transient PyPI 5xx), re-run with the existing tag:
#
#   gh workflow run release.yml --ref vX.Y.Z
#     → workflow_dispatch on the existing tag.
#     → build job: compute step detects `mode=tag` (tag ref + no version
#       input), reuses the same rewrite + assert path. The
#       tag-creation step is a no-op for tag mode (tag already exists).
#     → publish jobs: re-run; registries reject duplicate publishes so
#       this is idempotent for already-shipped channels and a fresh
#       publish for any that failed.
#
# How the version flows from the input:
#   - The wheel version (`pyproject.toml`) is dynamic via `hatch-vcs`,
#     but the build job pins `SETUPTOOLS_SCM_PRETEND_VERSION` to the
#     input so the wheel reports the right version even before the tag
#     is created. `hatch-vcs` reads `git describe --tags` only as a
#     fallback when the env var is unset.
#   - `goc/__init__.py`'s `__version__` literal and the five plugin
#     manifests (`openclaw-plugin/package.json` + `package-lock.json`,
#     `claude-plugin/.claude-plugin/plugin.json`,
#     `codex-plugin/.codex-plugin/plugin.json`, `.claude-plugin/marketplace.json`)
#     are rewritten at build time by `scripts/release_rewrite_versions.py`
#     using the input version. The same script also rewrites two
#     dogfood self-host surfaces — `.game-of-cards/deck/.goc-version`
#     and `AGENTS.md`'s `<!-- BEGIN GOC v… -->` marker — which the
#     `test_self_hosted_generated_surfaces_match_package_version`
#     regression check compares against `__version__`.
#     `scripts/sync_plugin_assets.py` then mirrors the rewritten
#     `__version__` into `claude-plugin/goc/`, `codex-plugin/goc/`, and
#     `openclaw-plugin/goc/` byte-for-byte.
#   - The build job commits all eleven rewritten files back to main as
#     `release: bump version literals to vX.Y.Z` under the
#     github-actions[bot] identity, and tags that commit. After the
#     workflow finishes, `git show vX.Y.Z:claude-plugin/.claude-plugin/plugin.json`
#     reads the correct version, and so does the file on `main`.
#   - Humans never edit version literals. The tripwire below fails the
#     build if a human commits a version-literal change to main, but
#     exempts the bot's own `release: bump version literals to v…`
#     commits so the next release dispatch can read the previous
#     release's commit as HEAD without tripping.
#
# Why no `push: tags:` trigger: the single-trigger flow makes tag-push
# obsolete. Pushing a tag manually now does nothing — the workflow is
# only entered via workflow_dispatch. Maintainer muscle memory needs to
# move to `gh workflow run release.yml -f version=X.Y.Z`. If you find
# yourself wanting tag-push back, re-read the closed predecessor card
# `auto-publish-npm-and-clawhub-on-tag-push` and this card
# (`find-single-trigger-release-flow-for-all-three-registries`) for the
# constraint trail.
#
# ClawHub stale-package.json: the ClawHub reusable workflow checks out
# `github.sha` (the commit the workflow_dispatch was triggered on) and
# reads `openclaw-plugin/package.json` from that commit. Under the
# version-input policy, that file still carries the *previous*
# release's version literal (the build job rewrites literals in its
# own checkout, but the ClawHub reusable workflow does its own
# checkout and never sees the rewrite). Resolved by passing
# `version: ${{ needs.build.outputs.release_version }}` to the
# reusable workflow's `version` input — it overrides the on-disk
# package.json version. Discovered on v0.0.14 with error
# `ConvexError: Version 0.0.12 already exists`.
#
# Security note for run: blocks below:
#   workflow_dispatch inputs (`version`, `dry_run`) and other untrusted
#   context values are passed into run: steps only via `env:` (never
#   inlined into a shell command via `${{ }}`). This is the documented
#   workflow-injection mitigation; see
#   <https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/>.
#
# Other dispatch modes:
#   - `gh workflow run release.yml -f dry_run=true` —
#     exercises rewrite + sync + build + smoke + dry-run publishes.
#     A static synthetic version (`0.99.0`) is used for the rewrite.
#     The tag-creation step is skipped.
#   - `gh workflow run release.yml --ref vX.Y.Z` —
#     re-runs publish for an existing tag (see "Recovery" above).

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to ship (e.g., 0.0.16). Required for a new release; leave empty when re-running publishes against an existing tag via `--ref vX.Y.Z`, or when passing dry_run=true.'
        type: string
        default: ''
      dry_run:
        description: 'Build + smoke only; do not publish'
        type: boolean
        default: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    permissions:
      # `contents: write` is required so the tag-creation step at the end
      # of this job can push `vX.Y.Z` back to the repo. The default
      # GITHUB_TOKEN does NOT trigger another workflow run when it pushes
      # tags (anti-recursion), so there is no loop risk.
      contents: write
    outputs:
      # Exposed downstream so publish jobs can:
      #   - mode: gate on `tag` or `release` (a new tag created in this run)
      #   - release_version: pass to the ClawHub reusable workflow's
      #     `version:` input, since that workflow checks out
      #     `github.sha` and reads the stale on-disk `package.json`
      #     (see ClawHub stale-package.json note in the header).
      release_version: ${{ steps.version.outputs.release_version }}
      mode: ${{ steps.version.outputs.mode }}
    steps:
      - uses: actions/checkout@v6
        with:
          # hatch-vcs reads `git describe --tags`; fetch full history + tags.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: '3.12'

      - name: Set up Node (npm install used to validate the lockfile rewrite)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Compute release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Recovery path: workflow_dispatch fired with `--ref vX.Y.Z` to
            # re-run publishes on an existing tag. The tag-creation step
            # is a no-op in this mode (tag already exists).
            release_version="${GITHUB_REF#refs/tags/v}"
            mode=tag
          elif [[ "$INPUT_DRY_RUN" == "true" ]]; then
            # A static synthetic version that is valid PEP 440 AND valid semver
            # so the rewrite + uv build + npm install paths exercise the same
            # code as a real release without needing a real tag.
            release_version="0.99.0"
            mode=dry_run
          elif [[ -n "$INPUT_VERSION" ]]; then
            # New-release path: workflow_dispatch fired from a branch (typically
            # main) with `-f version=X.Y.Z`. The build job will create and push
            # the tag as its LAST step, after every consistency check passes.
            release_version="$INPUT_VERSION"
            mode=release
          else
            echo "::error::release.yml dispatched without a version input or tag ref."
            echo "Usage:"
            echo "  gh workflow run release.yml -f version=X.Y.Z       # cut a new release"
            echo "  gh workflow run release.yml --ref vX.Y.Z           # re-run publishes on existing tag"
            echo "  gh workflow run release.yml -f dry_run=true        # build + smoke preview"
            exit 1
          fi
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "Release version: $release_version (mode: $mode)"

      - name: Tripwire — release commit must not edit version literals
        # The workflow IS the version writer. If a human re-introduces a manual
        # bump-and-tag commit (tag mode) or pushes a literal-bumping commit to
        # main and then dispatches (release mode), fail loudly so the policy
        # stays enforced.
        #
        # Exemption: the bot's own previous release commit (subject starts
        # with `release: bump version literals to v`, author is
        # `github-actions[bot]`) is allowed through. That commit IS the
        # workflow writing rewrites back to main, and the next release
        # dispatch will read it as HEAD — failing the tripwire here
        # would mean a release can only ever happen once.
        if: ${{ steps.version.outputs.mode == 'tag' || steps.version.outputs.mode == 'release' }}
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            head_author=$(git log -1 --pretty=%ae HEAD)
            head_subject=$(git log -1 --pretty=%s HEAD)
            if [ "$head_author" = "41898282+github-actions[bot]@users.noreply.github.com" ] \
              && printf '%s' "$head_subject" | grep -q '^release: bump version literals to v'; then
              echo "OK — HEAD is a bot release commit; tripwire skipped."
              echo "  author:  $head_author"
              echo "  subject: $head_subject"
              exit 0
            fi
            tracked='goc/__init__.py openclaw-plugin/package.json openclaw-plugin/package-lock.json claude-plugin/.claude-plugin/plugin.json codex-plugin/.codex-plugin/plugin.json .claude-plugin/marketplace.json'
            diff=$(git diff --name-only HEAD~1 HEAD -- $tracked)
            if [ -n "$diff" ]; then
              echo "ERROR: HEAD modifies version literals — the workflow is the version writer."
              echo "Files touched in $(git rev-parse --short HEAD):"
              echo "$diff" | sed 's/^/  /'
              echo "Revert the literal edits and re-dispatch."
              exit 1
            fi
          fi
          echo "OK — HEAD leaves version literals alone."

      - name: Refuse to overwrite an existing tag
        # In `release` mode, the tag must not already exist or the
        # tag-creation step later in this job will fail mid-publish.
        # Catch it early so the build doesn't run.
        if: ${{ steps.version.outputs.mode == 'release' }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/v$RELEASE_VERSION" >/dev/null; then
            echo "::error::Tag v$RELEASE_VERSION already exists."
            echo "If you meant to re-run publishes, dispatch with --ref v$RELEASE_VERSION instead."
            exit 1
          fi
          echo "OK — tag v$RELEASE_VERSION does not exist; safe to create."

      - name: Rewrite version literals
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: python3 scripts/release_rewrite_versions.py "$RELEASE_VERSION"

      - name: Sync plugin asset mirrors after rewrite
        # Propagates the new __version__ literal into claude-plugin/goc/,
        # codex-plugin/goc/, and openclaw-plugin/goc/ via the same byte-mirror
        # used by pre-commit.
        run: python3 scripts/sync_plugin_assets.py

      - name: Validate npm lockfile is internally consistent
        # If the regex rewrite of package-lock.json got out of sync with
        # package.json, `npm install --package-lock-only` would update the
        # lockfile here — which `npm ci` in publish-npm would then reject.
        # Surface that failure in the build job instead of two jobs later.
        #
        # `--ignore-scripts` is required: npm runs the `prepare` lifecycle
        # script (`npm run build` → `tsc`) even under `--package-lock-only`,
        # and tsc fails on a missing `@types/node` because the flag also
        # prevents an actual install. The validation is purely a lockfile
        # consistency check, so suppressing scripts is correct.
        working-directory: openclaw-plugin
        run: npm install --package-lock-only --no-audit --no-fund --ignore-scripts

      - name: Build distribution
        env:
          # The rewrite + sync steps above leave the working tree dirty
          # relative to HEAD, so hatch-vcs's `no-guess-dev` scheme would
          # emit `X.Y.Z.post1.dev0` instead of the bare release version.
          # Pin the wheel version explicitly via setuptools_scm's pretend
          # env var — works for all three modes (release / tag / dry_run)
          # and is not affected by tree dirtiness or whether the tag has
          # been created yet (in release mode the tag is pushed AFTER
          # this step).
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          uv build
          ls -la dist/

      - name: Assert wheel version matches release version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          shopt -s nullglob
          wheels=(dist/game_of_cards-*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "ERROR: expected exactly one wheel in dist/, found ${#wheels[@]}"
            ls -la dist/ || true
            exit 1
          fi
          wheel="${wheels[0]##*/}"
          # game_of_cards-X.Y.Z-py3-none-any.whl
          actual=$(echo "$wheel" | sed -E 's/^game_of_cards-([^-]+)-py3-none-any\.whl$/\1/')
          if [ "$actual" != "$RELEASE_VERSION" ]; then
            echo "ERROR: wheel version $actual does not match release version $RELEASE_VERSION"
            exit 1
          fi
          echo "OK — wheel reports version $actual"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Commit rewrites back to main
        # Promotes the rewrite from an in-workflow-only artifact to a
        # real commit on `main`, so consumers that read the repo's git
        # tree directly (Claude Code's plugin manager is the only one
        # today) see the correct version literal. The wheel/npm/ClawHub
        # publish channels already had their own overrides; this step
        # fixes the fourth channel that has no override mechanism.
        #
        # Only runs in `release` mode (new release dispatch from a
        # non-tag ref with a version input). In `tag` mode (recovery
        # re-publish) the rewrite commit already exists from the
        # original release; in `dry_run` mode nothing should be
        # committed.
        #
        # All eleven files are staged explicitly so an unrelated
        # working-tree change (e.g. a stale plugin-asset mirror caught
        # by sync) does NOT silently sneak into the release commit.
        # The list:
        #   - 6 publish-channel manifests rewritten by release_rewrite_versions.py
        #   - 3 plugin-payload `__init__.py` mirrors written by sync_plugin_assets.py
        #   - 2 dogfood self-host surfaces (.goc-version + AGENTS.md marker)
        #     rewritten by release_rewrite_versions.py
        # If `git diff --cached` shows nothing, the run is a no-op
        # passthrough (re-dispatch on a version that was already
        # written) and the step exits cleanly without committing.
        if: ${{ steps.version.outputs.mode == 'release' }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            goc/__init__.py \
            openclaw-plugin/package.json \
            openclaw-plugin/package-lock.json \
            claude-plugin/.claude-plugin/plugin.json \
            codex-plugin/.codex-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            claude-plugin/goc/__init__.py \
            codex-plugin/goc/__init__.py \
            openclaw-plugin/goc/__init__.py \
            .game-of-cards/deck/.goc-version \
            AGENTS.md
          if git diff --cached --quiet; then
            echo "::notice::No version-literal changes to commit (idempotent re-dispatch on already-shipped version)."
            exit 0
          fi
          git commit -m "release: bump version literals to v$RELEASE_VERSION"
          git push origin "HEAD:$GITHUB_REF_NAME"
          echo "::notice::Pushed release commit $(git rev-parse --short HEAD) to $GITHUB_REF_NAME"

      - name: Create and push release tag
        # LAST step of the build job. Only runs in `release` mode (new
        # release dispatched from a non-tag ref with a version input).
        # In `tag` mode the tag already exists; in `dry_run` mode no
        # tag should be created. Running this as the final step means
        # every consistency check (rewrite, lockfile, wheel-version
        # assertion, artifact upload, commit-back) has already passed
        # — the tag is pushed only when the build is genuinely
        # shippable AND the rewrites are durable on main.
        if: ${{ steps.version.outputs.mode == 'release' }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          # Git identity already set by the previous step; set defensively
          # in case the commit-back was a no-op passthrough.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tagged_sha=$(git rev-parse HEAD)
          git tag -a "v$RELEASE_VERSION" -m "Release v$RELEASE_VERSION"
          git push origin "v$RELEASE_VERSION"
          echo "::notice::Pushed tag v$RELEASE_VERSION -> $tagged_sha"

  smoke:
    # End-to-end smoke test that gates publishes on the plugin actually
    # working in a fresh consumer environment. Reuses the same Claude Code
    # OAuth surface as pull-card.yml — no new secrets required.
    #
    # Path A: pre-installs goc + grants Bash(goc:*); asserts Skill(kickoff)
    #   completes and creates .game-of-cards/deck/.
    # Path B: no goc install + no Bash(goc:*) allowance; asserts the LLM
    #   correctly routes from Skill(audit-deck) to Skill(kickoff) and
    #   that kickoff surfaces the verbatim remediation text.
    name: End-to-end auto-bootstrap smoke
    needs: build
    runs-on: ubuntu-latest
    # The workflow only has a `workflow_dispatch` trigger, so this `if:`
    # is structurally always true today. Kept explicit as a guard against
    # a future re-introduction of `push:` (anthropics/claude-code-action@v1
    # historically rejected the `push` event family, so smoke would fail
    # at action startup). If the action ever supports push events, this
    # gate can be removed.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install uv (Path A pre-install of goc)
        uses: astral-sh/setup-uv@v8
        with:
          python-version: '3.12'

      - name: Pre-install goc CLI for Path A
        run: |
          uv tool install --force "${{ github.workspace }}"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Path A workspace
        run: |
          rm -rf /tmp/smoke-A && mkdir -p /tmp/smoke-A
          ( cd /tmp/smoke-A && git init -q -b main )

      - name: Path A — kickoff completes against fresh repo
        id: smoke_a
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path A. The test directory `/tmp/smoke-A` has
            ALREADY been created as an empty git repo by the workflow.
            Do NOT re-create it.

            Each Bash tool call runs in a fresh shell — `cd` does not
            persist between calls. For every command that must run inside
            the test repo, prefix it: `cd /tmp/smoke-A && <command>`.

            1. Invoke `Skill(audit-deck)`. Its preflight section will tell
               you to invoke `Skill(kickoff)` because the deck doesn't exist.
            2. Run `Skill(kickoff)` to completion. `goc` is on PATH for
               this run. Kickoff should run `cd /tmp/smoke-A && goc install`
               and create `/tmp/smoke-A/.game-of-cards/deck/`.
            3. Verify `/tmp/smoke-A/.game-of-cards/deck/` exists, then write
               the literal string `A:passed` to `/tmp/smoke-A/result.txt`.
               Exit afterward.

            Do not run additional cards, do not queue work, do not generalize.
            The only goal is to prove kickoff succeeds end-to-end.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Edit,Bash,Skill(kickoff),Skill(audit-deck)"
            --max-turns 30

      - name: Assert Path A
        run: |
          test -d /tmp/smoke-A/.game-of-cards/deck \
            || { echo "FAIL Path A: .game-of-cards/deck/ not created"; exit 1; }
          grep -q '^A:passed' /tmp/smoke-A/result.txt \
            || { echo "FAIL Path A: result.txt missing or wrong"; cat /tmp/smoke-A/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path A passed"

      - name: Set up Path B workspace
        run: |
          rm -rf /tmp/smoke-B && mkdir -p /tmp/smoke-B
          ( cd /tmp/smoke-B && git init -q -b main )

      - name: Path B — preflight routes to kickoff when goc is not allowed
        id: smoke_b
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path B. Test directory `/tmp/smoke-B` is ALREADY
            an empty git repo (created by the workflow). Do NOT re-create it.

            `goc` invocations are intentionally NOT in the allowlist for this
            run, simulating a fresh consumer install where `Bash(goc:*)` has
            not yet been granted.

            1. Invoke `Skill(audit-deck)`. Its `!`-blocks calling `goc` will
               be denied at render time; the skill's preflight section
               instructs you to invoke `Skill(kickoff)` in response.
            2. Run `Skill(kickoff)`. It should detect the missing
               `Bash(goc:*)` rule and surface verbatim remediation text
               telling the user to add it to `~/.claude/settings.json`.
            3. After confirming that kickoff's response contains the
               literal substring `Bash(goc:*)` AND the literal substring
               `permissions.allow`, write the literal string `B:passed`
               to `/tmp/smoke-B/result.txt`. Use the Write tool, not Bash.

            Do NOT attempt to install goc, modify settings, or run goc.
            The only goal is to prove the routing fires and the remediation
            text is emitted.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Bash(cat:*),Bash(ls:*),Skill(kickoff),Skill(audit-deck)"
            --max-turns 20

      - name: Assert Path B
        run: |
          grep -q '^B:passed' /tmp/smoke-B/result.txt \
            || { echo "FAIL Path B: result.txt missing or wrong"; cat /tmp/smoke-B/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path B passed"

  publish-pypi:
    name: Publish to PyPI
    needs: [build, smoke]
    runs-on: ubuntu-latest
    # `always()` keeps this from being auto-skipped if smoke is skipped
    # (no path skips it today, but the gate is kept defensive). The
    # explicit result checks then require build to succeed and smoke to
    # either succeed or be skipped — never to have failed. The
    # `release` mode publishes from `refs/heads/main` (the workflow
    # created the tag in this run); the `tag` mode publishes from
    # `refs/tags/vX.Y.Z` (recovery / republish).
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && (needs.build.outputs.mode == 'tag' || needs.build.outputs.mode == 'release') && !inputs.dry_run }}
    environment:
      name: pypi
      url: https://pypi.org/project/game-of-cards/
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` field — uses OIDC trusted publishing.
          # Print upload metadata for the workflow log.
          print-hash: true
          verbose: true

  publish-npm:
    name: Publish to npm
    needs: [build, smoke]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && (needs.build.outputs.mode == 'tag' || needs.build.outputs.mode == 'release') && !inputs.dry_run }}
    environment:
      name: npm
      url: https://www.npmjs.com/package/game-of-cards
    permissions:
      id-token: write  # OIDC for npm trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Rewrite version literals from build output
        # publish-npm is a separate job from `build` and gets its own
        # clean checkout — the rewrites the build job made do not carry
        # over here. Use the build job's `release_version` output
        # (deterministic) and re-run the same rewrite script.
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.release_version }}
        run: python3 scripts/release_rewrite_versions.py "$RELEASE_VERSION"

      - name: Install plugin deps
        working-directory: openclaw-plugin
        run: npm ci

      - name: Build dist
        working-directory: openclaw-plugin
        run: npm run build

      - name: Publish to npm with provenance
        working-directory: openclaw-plugin
        run: npm publish --provenance --access public

  publish-clawhub:
    # ClawHub publish via the official reusable workflow.
    #
    # Authentication: GitHub OIDC trusted publishing (audience
    # `clawhub-workflow-source`). The package was registered on ClawHub
    # under the OIDC publisher identity (the GitHub repo
    # `zauberzeug/game-of-cards`); subsequent publishes must come through
    # the same identity. Do NOT introduce a `CLAWHUB_TOKEN` secret to
    # extend coverage to push events: the reusable workflow's
    # token-override path authenticates as a different publisher (the
    # `clawhub login` user) and ClawHub's Convex store rejects the
    # publish with `Package already exists and belongs to another
    # publisher`.
    needs: [build, smoke]
    # workflow_dispatch only — ClawHub's OIDC TP refuses any other event
    # type. The whole workflow now triggers only on workflow_dispatch
    # (no `push: tags:`), so the event-name check is structurally always
    # true today; kept defensive in case `push:` is ever re-added. Both
    # the new-release path (`release` mode) and the recovery path
    # (`tag` mode) are accepted, plus dry-run preview.
    if: ${{ always() && needs.build.result == 'success' && needs.smoke.result == 'success' && github.event_name == 'workflow_dispatch' && (((needs.build.outputs.mode == 'tag' || needs.build.outputs.mode == 'release') && !inputs.dry_run) || inputs.dry_run == true) }}
    permissions:
      # id-token: write is required for OIDC trusted publishing. The
      # reusable workflow uses audience `clawhub-workflow-source` to
      # mint the publish credential; without it, the workflow fails at
      # startup.
      id-token: write
      contents: read
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.12.3
    with:
      # `source_path` (not `source: ./openclaw-plugin`) — the server-side
      # check "Trusted publish source ref must match the verified GitHub
      # ref" rejects local-folder source strings. With source_path,
      # source defaults to GITHUB_REPOSITORY@github.sha which matches
      # the ref claim minted by the OIDC token.
      source_path: openclaw-plugin
      # Override the on-disk `package.json` version — the reusable
      # workflow checks out the tagged commit, whose `package.json`
      # still carries the previous release's literal (the workflow
      # rewrites version literals at build time, but the ClawHub
      # reusable workflow does its own checkout and never sees the
      # rewrite). Without this override, the publish step fails with
      # `ConvexError: Version 0.0.X already exists` (the previous
      # release's number). `release_version` is computed by the build
      # job from the tag ref.
      version: ${{ needs.build.outputs.release_version }}
      dry_run: ${{ inputs.dry_run == true }}
