# Release workflow — publishes `game-of-cards` to PyPI on tag push.
#
# Authentication: PyPI trusted publishing (OIDC). No token stored as
# a repo secret. To enable, configure this workflow as a trusted
# publisher for the `game-of-cards` project at:
#
#   https://pypi.org/manage/project/game-of-cards/settings/publishing/
#
# Required claim values:
#   Owner:                   zauberzeug
#   Repository:              game-of-cards
#   Workflow name:           release.yml
#   Environment:             pypi
#
# Tag convention: `v0.1.0`, `v0.2.3`, `v1.0.0`, etc. The tag must
# match the version in pyproject.toml — the build step verifies this.

name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only; do not publish'
        type: boolean
        default: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          py_version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$py_version" ]; then
            echo "Tag v$tag_version does not match pyproject.toml version $py_version"
            exit 1
          fi
          echo "Version match: v$tag_version"

      - name: Build distribution
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  smoke:
    # End-to-end smoke test that gates PyPI publish on the plugin actually
    # working in a fresh consumer environment. Reuses the same Claude Code
    # OAuth surface as pull-card.yml — no new secrets required.
    #
    # Path A: pre-installs goc + grants Bash(goc:*); asserts Skill(bootstrap)
    #   completes and creates .game-of-cards/deck/.
    # Path B: no goc install + no Bash(goc:*) allowance; asserts the LLM
    #   correctly routes from Skill(extend-deck) to Skill(bootstrap) and
    #   that bootstrap surfaces the verbatim remediation text.
    name: End-to-end auto-bootstrap smoke
    needs: build
    runs-on: ubuntu-latest
    # Run on real tag pushes AND on workflow_dispatch (so dry_run can exercise
    # the smoke without publishing). Only skip when nothing else triggers it.
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Path A pre-install of goc)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Pre-install goc CLI for Path A
        run: |
          uv tool install --force "${{ github.workspace }}"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Path A workspace
        run: |
          rm -rf /tmp/smoke-A && mkdir -p /tmp/smoke-A
          ( cd /tmp/smoke-A && git init -q -b main )

      - name: Path A — bootstrap completes against fresh repo
        id: smoke_a
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path A. The test directory `/tmp/smoke-A` has
            ALREADY been created as an empty git repo by the workflow.
            Do NOT re-create it.

            Each Bash tool call runs in a fresh shell — `cd` does not
            persist between calls. For every command that must run inside
            the test repo, prefix it: `cd /tmp/smoke-A && <command>`.

            1. Invoke `Skill(extend-deck)`. Its preflight section will tell
               you to invoke `Skill(bootstrap)` because the deck doesn't exist.
            2. Run `Skill(bootstrap)` to completion. `goc` is on PATH for
               this run. Bootstrap should run `cd /tmp/smoke-A && goc install`
               and create `/tmp/smoke-A/.game-of-cards/deck/`.
            3. Verify `/tmp/smoke-A/.game-of-cards/deck/` exists, then write
               the literal string `A:passed` to `/tmp/smoke-A/result.txt`.
               Exit afterward.

            Do not run additional cards, do not queue work, do not generalize.
            The only goal is to prove bootstrap succeeds end-to-end.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Edit,Bash,Skill(bootstrap),Skill(extend-deck)"
            --max-turns 30

      - name: Assert Path A
        run: |
          test -d /tmp/smoke-A/.game-of-cards/deck \
            || { echo "FAIL Path A: .game-of-cards/deck/ not created"; exit 1; }
          grep -q '^A:passed' /tmp/smoke-A/result.txt \
            || { echo "FAIL Path A: result.txt missing or wrong"; cat /tmp/smoke-A/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path A passed"

      - name: Set up Path B workspace
        run: |
          rm -rf /tmp/smoke-B && mkdir -p /tmp/smoke-B
          ( cd /tmp/smoke-B && git init -q -b main )

      - name: Path B — preflight routes to bootstrap when goc is not allowed
        id: smoke_b
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path B. Test directory `/tmp/smoke-B` is ALREADY
            an empty git repo (created by the workflow). Do NOT re-create it.

            `goc` invocations are intentionally NOT in the allowlist for this
            run, simulating a fresh consumer install where `Bash(goc:*)` has
            not yet been granted.

            1. Invoke `Skill(extend-deck)`. Its `!`-blocks calling `goc` will
               be denied at render time; the skill's preflight section
               instructs you to invoke `Skill(bootstrap)` in response.
            2. Run `Skill(bootstrap)`. It should detect the missing
               `Bash(goc:*)` rule and surface verbatim remediation text
               telling the user to add it to `~/.claude/settings.json`.
            3. After confirming that bootstrap's response contains the
               literal substring `Bash(goc:*)` AND the literal substring
               `permissions.allow`, write the literal string `B:passed`
               to `/tmp/smoke-B/result.txt`. Use the Write tool, not Bash.

            Do NOT attempt to install goc, modify settings, or run goc.
            The only goal is to prove the routing fires and the remediation
            text is emitted.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Bash(cat:*),Bash(ls:*),Skill(bootstrap),Skill(extend-deck)"
            --max-turns 20

      - name: Assert Path B
        run: |
          grep -q '^B:passed' /tmp/smoke-B/result.txt \
            || { echo "FAIL Path B: result.txt missing or wrong"; cat /tmp/smoke-B/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path B passed"

  publish:
    name: Publish to PyPI
    needs: [build, smoke]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    environment:
      name: pypi
      url: https://pypi.org/project/game-of-cards/
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` field — uses OIDC trusted publishing.
          # Print upload metadata for the workflow log.
          print-hash: true
          verbose: true
