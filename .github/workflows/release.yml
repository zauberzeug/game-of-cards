# Release workflow — publishes `game-of-cards` to PyPI, npm, and ClawHub
# via OIDC trusted publishing.
#
# Authentication: OIDC trusted publishing on every channel — no long-lived
# tokens in repo secrets. Each publish target is a one-time web-UI/CLI
# configuration that authorizes this workflow to mint short-lived publish
# tokens via the GitHub Actions id-token.
#
# Trusted publisher entries (configured once):
#
#   PyPI:    https://pypi.org/manage/project/game-of-cards/settings/publishing/
#            Owner: zauberzeug · Repo: game-of-cards · Workflow: release.yml · Env: pypi
#
#   npm:     https://www.npmjs.com/package/game-of-cards/access
#            Owner: zauberzeug · Repo: game-of-cards · Workflow: release.yml · Env: npm
#
#   ClawHub: `clawhub package trusted-publisher set game-of-cards \
#               --repository zauberzeug/game-of-cards --workflow-filename release.yml`
#            (NOTE: do NOT pass --environment — ClawHub uses the official
#            reusable workflow which can't set a job-level environment, so
#            the OIDC token won't carry an environment claim. The trusted
#            publisher entry must therefore not require one.)
#
# Tag convention: `v0.1.0`, `v0.2.3`, `v1.0.0`, etc. The tag must match
# the version in pyproject.toml AND openclaw-plugin/package.json (build
# step verifies both before any publish runs).
#
# Canonical release flow:
#
#   1. Bump versions across pyproject.toml, goc/__init__.py,
#      openclaw-plugin/package.json + package-lock.json,
#      claude-plugin/.claude-plugin/plugin.json, and
#      .claude-plugin/marketplace.json. Run `python3 scripts/sync_plugin_assets.py`
#      then `uv sync`. Commit and push main.
#   2. Tag and push: `git tag vX.Y.Z && git push origin vX.Y.Z`.
#      → tag-push triggers build → publish-pypi + publish-npm.
#   3. `gh workflow run release.yml --ref vX.Y.Z`.
#      → workflow_dispatch on the tag triggers publish-clawhub.
#      (PyPI and npm jobs run again but no-op against duplicate versions.)
#
# Why two triggers? ClawHub's official reusable workflow refuses OIDC on
# `push` events ("Real publishes need ... GitHub OIDC on workflow_dispatch
# runs"). It only mints publish tokens when the trigger is workflow_dispatch.
# PyPI + npm work fine on tag-push, so we keep that path active for them.
#
# Other dispatch modes:
#   - `gh workflow run release.yml --ref main --field dry_run=true` —
#     exercises build + smoke + a clawhub dry-run publish without uploading.
#   - `gh workflow run release.yml --ref main` (no dry_run) —
#     publishes to ClawHub from main HEAD (skips PyPI + npm because the
#     tag-ref guard fails). Useful for re-trying ClawHub if its publish
#     failed during the initial release.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + smoke only; do not publish'
        type: boolean
        default: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Verify tag matches pyproject + package.json versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          py_version=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag_version" != "$py_version" ]; then
            echo "Tag v$tag_version does not match pyproject.toml version $py_version"
            exit 1
          fi
          npm_version=$(node -p "require('./openclaw-plugin/package.json').version")
          if [ "$tag_version" != "$npm_version" ]; then
            echo "Tag v$tag_version does not match openclaw-plugin/package.json version $npm_version"
            exit 1
          fi
          echo "Version match: v$tag_version (PyPI + npm + ClawHub)"

      - name: Build distribution
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  smoke:
    # End-to-end smoke test that gates publishes on the plugin actually
    # working in a fresh consumer environment. Reuses the same Claude Code
    # OAuth surface as pull-card.yml — no new secrets required.
    #
    # Path A: pre-installs goc + grants Bash(goc:*); asserts Skill(kickoff)
    #   completes and creates .game-of-cards/deck/.
    # Path B: no goc install + no Bash(goc:*) allowance; asserts the LLM
    #   correctly routes from Skill(audit-deck) to Skill(kickoff) and
    #   that kickoff surfaces the verbatim remediation text.
    name: End-to-end auto-bootstrap smoke
    needs: build
    runs-on: ubuntu-latest
    # `anthropics/claude-code-action@v1` rejects the `push` event family
    # ("Unsupported event type: push"), so smoke can only run under
    # workflow_dispatch. Tag-push releases skip smoke; the publish jobs
    # below tolerate that via an explicit `needs.smoke.result == 'skipped'`
    # branch in their `if`. To exercise smoke against a tag, use
    # `gh workflow run release.yml --ref vX.Y.Z`.
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Path A pre-install of goc)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Pre-install goc CLI for Path A
        run: |
          uv tool install --force "${{ github.workspace }}"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Path A workspace
        run: |
          rm -rf /tmp/smoke-A && mkdir -p /tmp/smoke-A
          ( cd /tmp/smoke-A && git init -q -b main )

      - name: Path A — kickoff completes against fresh repo
        id: smoke_a
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path A. The test directory `/tmp/smoke-A` has
            ALREADY been created as an empty git repo by the workflow.
            Do NOT re-create it.

            Each Bash tool call runs in a fresh shell — `cd` does not
            persist between calls. For every command that must run inside
            the test repo, prefix it: `cd /tmp/smoke-A && <command>`.

            1. Invoke `Skill(audit-deck)`. Its preflight section will tell
               you to invoke `Skill(kickoff)` because the deck doesn't exist.
            2. Run `Skill(kickoff)` to completion. `goc` is on PATH for
               this run. Kickoff should run `cd /tmp/smoke-A && goc install`
               and create `/tmp/smoke-A/.game-of-cards/deck/`.
            3. Verify `/tmp/smoke-A/.game-of-cards/deck/` exists, then write
               the literal string `A:passed` to `/tmp/smoke-A/result.txt`.
               Exit afterward.

            Do not run additional cards, do not queue work, do not generalize.
            The only goal is to prove kickoff succeeds end-to-end.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Edit,Bash,Skill(kickoff),Skill(audit-deck)"
            --max-turns 30

      - name: Assert Path A
        run: |
          test -d /tmp/smoke-A/.game-of-cards/deck \
            || { echo "FAIL Path A: .game-of-cards/deck/ not created"; exit 1; }
          grep -q '^A:passed' /tmp/smoke-A/result.txt \
            || { echo "FAIL Path A: result.txt missing or wrong"; cat /tmp/smoke-A/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path A passed"

      - name: Set up Path B workspace
        run: |
          rm -rf /tmp/smoke-B && mkdir -p /tmp/smoke-B
          ( cd /tmp/smoke-B && git init -q -b main )

      - name: Path B — preflight routes to kickoff when goc is not allowed
        id: smoke_b
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          show_full_output: true
          prompt: |
            CI smoke test, Path B. Test directory `/tmp/smoke-B` is ALREADY
            an empty git repo (created by the workflow). Do NOT re-create it.

            `goc` invocations are intentionally NOT in the allowlist for this
            run, simulating a fresh consumer install where `Bash(goc:*)` has
            not yet been granted.

            1. Invoke `Skill(audit-deck)`. Its `!`-blocks calling `goc` will
               be denied at render time; the skill's preflight section
               instructs you to invoke `Skill(kickoff)` in response.
            2. Run `Skill(kickoff)`. It should detect the missing
               `Bash(goc:*)` rule and surface verbatim remediation text
               telling the user to add it to `~/.claude/settings.json`.
            3. After confirming that kickoff's response contains the
               literal substring `Bash(goc:*)` AND the literal substring
               `permissions.allow`, write the literal string `B:passed`
               to `/tmp/smoke-B/result.txt`. Use the Write tool, not Bash.

            Do NOT attempt to install goc, modify settings, or run goc.
            The only goal is to prove the routing fires and the remediation
            text is emitted.
          claude_args: |
            --plugin-dir ${{ github.workspace }}/claude-plugin
            --permission-mode dontAsk
            --allowedTools "Read,Write,Bash(cat:*),Bash(ls:*),Skill(kickoff),Skill(audit-deck)"
            --max-turns 20

      - name: Assert Path B
        run: |
          grep -q '^B:passed' /tmp/smoke-B/result.txt \
            || { echo "FAIL Path B: result.txt missing or wrong"; cat /tmp/smoke-B/result.txt 2>/dev/null; exit 1; }
          echo "::notice::Path B passed"

  publish-pypi:
    name: Publish to PyPI
    needs: [build, smoke]
    runs-on: ubuntu-latest
    # `always()` keeps this from being auto-skipped when `smoke` is
    # skipped (the tag-push path). The explicit result checks then
    # require build to succeed and smoke to either succeed or be
    # skipped — never to have failed.
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    environment:
      name: pypi
      url: https://pypi.org/project/game-of-cards/
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` field — uses OIDC trusted publishing.
          # Print upload metadata for the workflow log.
          print-hash: true
          verbose: true

  publish-npm:
    name: Publish to npm
    needs: [build, smoke]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && startsWith(github.ref, 'refs/tags/v') && !inputs.dry_run }}
    environment:
      name: npm
      url: https://www.npmjs.com/package/game-of-cards
    permissions:
      id-token: write  # OIDC for npm trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install plugin deps
        working-directory: openclaw-plugin
        run: npm ci

      - name: Build dist
        working-directory: openclaw-plugin
        run: npm run build

      - name: Publish to npm with provenance
        working-directory: openclaw-plugin
        run: npm publish --provenance --access public

  publish-clawhub:
    # ClawHub trusted publishing requires invoking the official reusable
    # workflow at openclaw/clawhub/.github/workflows/package-publish.yml.
    # Inline `clawhub package publish` calls fail server-side validation
    # with: "Only the official ClawHub reusable workflow is supported for
    # trusted publishing".
    #
    # Note: reusable workflow calls cannot set `environment:` or `name:`
    # at the job level — only `if`, `permissions`, `secrets`, `with`,
    # `concurrency`, `strategy`, `needs`, and `uses`. The OIDC token
    # therefore won't carry an `environment` claim, so the ClawHub
    # trusted publisher entry must be configured WITHOUT a required
    # environment (or with `environment: ` left blank).
    needs: [build, smoke]
    if: ${{ always() && needs.build.result == 'success' && (needs.smoke.result == 'success' || needs.smoke.result == 'skipped') && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
    permissions:
      id-token: write
      contents: read
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@v0.12.3
    with:
      # `source_path` (not `source`) — local-folder publishes set
      # source = ./openclaw-plugin which doesn't include a ref, so
      # ClawHub's server-side check "Trusted publish source ref must
      # match the verified GitHub ref" fails. Leaving source empty
      # defaults it to GITHUB_REPOSITORY (zauberzeug/game-of-cards),
      # which then gets the github.sha appended automatically; the
      # source_path narrows it to the openclaw-plugin subdir.
      source_path: openclaw-plugin
      # Do NOT pass `owner: zauberzeug` — ClawHub trusted publishing
      # rejects manual owner overrides ("Trusted publishes must not
      # override the package owner"). The trusted-publisher entry +
      # package's owned-by-zauberzeug metadata are authoritative.
      dry_run: ${{ inputs.dry_run == true }}
