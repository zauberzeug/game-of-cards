# Debug-only workflow for ClawHub OIDC trusted-publishing handshake.
#
# Runs ONLY on workflow_dispatch — never on push/tag. Does NOT publish
# anything. Just exercises the OIDC token request + mint endpoint and
# prints the decoded JWT claims and the ClawHub server response so we
# can diagnose why `clawhub package publish` falls back to the "Not
# logged in" path despite a configured trusted publisher.
#
# Trigger with:
#   gh workflow run oidc-debug.yml
#
# Delete this file once `auto-publish-npm-and-clawhub-on-tag-push`
# verifies end-to-end. It exists only because debugging the
# trusted-publisher OIDC handshake via real release tags burns
# unrecoverable PyPI/npm version numbers.

name: OIDC handshake debug (ClawHub)

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Package name to mint a publish token for
        type: string
        default: game-of-cards
      probe_version:
        description: Version string to send in the mint payload (no real publish happens)
        type: string
        default: 0.0.0-debug
      audience:
        description: OIDC audience claim
        type: string
        default: clawhub

jobs:
  probe:
    name: Probe ClawHub OIDC mint endpoint
    runs-on: ubuntu-latest
    environment:
      name: clawhub
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Request GitHub OIDC token + decode claims
        id: get_token
        env:
          AUDIENCE: ${{ inputs.audience }}
        run: |
          set +e
          oidc_response=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")
          oidc_token=$(echo "$oidc_response" | node -e 'let s=""; process.stdin.on("data",d=>s+=d); process.stdin.on("end",()=>{ try { console.log(JSON.parse(s).value); } catch(e) { console.log("PARSE_ERROR"); } });')
          if [ "$oidc_token" = "PARSE_ERROR" ] || [ -z "$oidc_token" ]; then
            echo "Failed to extract OIDC token. Raw response:"
            echo "$oidc_response"
            exit 1
          fi
          echo "OIDC token issued (audience=$AUDIENCE)"
          echo "Decoded claims:"
          echo "$oidc_token" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -m json.tool 2>/dev/null || true
          echo "::add-mask::$oidc_token"
          echo "token=$oidc_token" >> "$GITHUB_OUTPUT"

      - name: POST to /api/v1/publish/token/mint
        env:
          OIDC_TOKEN: ${{ steps.get_token.outputs.token }}
          PKG: ${{ inputs.package_name }}
          VER: ${{ inputs.probe_version }}
        run: |
          set +e
          echo "Hitting POST https://clawhub.ai/api/v1/publish/token/mint"
          payload=$(jq -nc \
            --arg pkg "$PKG" \
            --arg ver "$VER" \
            --arg tok "$OIDC_TOKEN" \
            '{packageName:$pkg, version:$ver, githubOidcToken:$tok}')
          curl -sS -i \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://clawhub.ai/api/v1/publish/token/mint" 2>&1 | head -60
