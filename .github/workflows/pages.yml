# Pages deployment — serves a custom HTML home page at /, renders goc.md
# and ABOUT.md as Jekyll subpages, AND publishes raw markdown mirrors at
# fixed paths so LLMs can fetch the same content as plain text/markdown.
#
# Source-of-truth files:
#   site/index.html     → /              (custom rendered HTML for humans)
#   site/styles.css     → /styles.css
#   site/stars.js       → /stars.js
#   README.md           → /index.md      (raw markdown for LLMs)
#                       → /README.md     (raw mirror at conventional name)
#   goc.md              → /goc/          (Jekyll-rendered)
#                       → /goc.md        (raw)
#   ABOUT.md            → /about/        (Jekyll-rendered)
#                       → /ABOUT.md      (raw)
#   assets/**           → /assets/**     (referenced by site, goc, about)
#
# A curated /llms.txt (llmstxt.org convention) gives crawlers a terse
# summary plus pointers to the raw documents.
#
# Pipeline (single Python step, then Jekyll):
#   1. The Python step writes everything Jekyll needs into _pages/:
#      - Rendered subpages (goc-page.md, about-page.md) with front matter,
#        permalinks, H1 stripped, repo-relative markdown links rewritten
#        to site paths or absolute GitHub blob URLs.
#      - Raw mirrors (index.md, README.md, goc.md, ABOUT.md, llms.txt)
#        with NO front matter — Jekyll treats files without front matter
#        as static assets and copies them through verbatim.
#      - site/** copied verbatim (custom home page + its CSS/JS).
#      - assets/** copied so the comic and how-it-works diagram resolve
#        identically on GitHub and on the rendered site.
#   2. Jekyll builds _pages/ → _site/ via jekyll-theme-cayman (used by the
#      goc/ and about/ subpages — the home page is plain HTML, so the
#      theme does not touch it).
#   3. upload-pages-artifact ships _site/ untouched.
#
# Why a single pre-Jekyll synthesis step (no post-build step):
# `actions/jekyll-build-pages` runs Jekyll in a Docker container as a
# different UID, so a host-runner step writing into _site/ after the
# build hits "Permission denied". Putting the raw mirrors into the
# Jekyll source instead lets the container do all the writes, and
# Jekyll's pass-through rule for front-matter-less files preserves
# them byte-for-byte at the requested URL.
#
# Security: only `github.repository` is interpolated into a run: command,
# and it's indirected through env: per the safe-injection pattern. No
# attacker-controlled inputs are used.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - README.md
      - goc.md
      - ABOUT.md
      - assets/**
      - site/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Synthesize Jekyll site
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import os
          import re
          import shutil
          from pathlib import Path

          repo = os.environ["REPO"]
          base = f"https://github.com/{repo}/blob/main"
          out = Path("_pages")
          out.mkdir(exist_ok=True)

          def rewrite_links(text: str) -> str:
              rules = [
                  (r"\]\(README\.md\)", "](/)"),
                  (r"\]\(goc\.md\)", "](/goc/)"),
                  (r"\]\(ABOUT\.md\)", "](/about/)"),
                  (r"\]\(AGENTS\.md\)", f"]({base}/AGENTS.md)"),
                  (r"\]\(LICENSE\)", f"]({base}/LICENSE)"),
                  (r"\]\((goc/[^)]+|\.game-of-cards/[^)]+|deck/[^)]+)\)",
                   f"]({base}/\\1)"),
              ]
              for pat, repl in rules:
                  text = re.sub(pat, repl, text)
              return text

          def strip_first_h1(text: str) -> str:
              lines = text.splitlines(keepends=True)
              for i, line in enumerate(lines):
                  if line.startswith("# "):
                      del lines[i]
                      if i < len(lines) and lines[i].strip() == "":
                          del lines[i]
                      break
              return "".join(lines)

          def render_page(src: str, out_name: str, title: str,
                          permalink: str, description: str = "") -> None:
              body = rewrite_links(strip_first_h1(Path(src).read_text()))
              front = ["---", "layout: default", f"title: {title}",
                      f"permalink: {permalink}"]
              if description:
                  front.append(f"description: {description}")
              front.append("---")
              (out / out_name).write_text("\n".join(front) + "\n" + body)

          # Subpages (Jekyll-rendered via Cayman). The home page is served
          # as static HTML from site/index.html — see the copy step below.
          render_page(
              "goc.md", "goc-page.md",
              "goc — the Game of Cards CLI", "/goc/",
          )
          render_page(
              "ABOUT.md", "about-page.md",
              "Background — context for Game of Cards", "/about/",
          )

          # Raw markdown mirrors — no front matter means Jekyll treats
          # them as static files and copies them through unchanged.
          (out / "index.md").write_text(Path("README.md").read_text())
          (out / "README.md").write_text(Path("README.md").read_text())
          (out / "goc.md").write_text(Path("goc.md").read_text())
          (out / "ABOUT.md").write_text(Path("ABOUT.md").read_text())

          # Curated llms.txt — terse summary + pointers to the raw
          # documents above (llmstxt.org convention).
          (out / "llms.txt").write_text("""# Game of Cards

          > Agile for the age of agents: a repo-native methodology for turning work into durable, inspectable cards that humans and coding agents share.

          ## Install

          Bootstrap via the PyPI package `game-of-cards`. The simplest path is to ask your coding agent in any repo:

          > Install Game of Cards (https://github.com/zauberzeug/game-of-cards) in this repo, then create a first card for the next small improvement.

          Manual: `uv tool install game-of-cards` or `pipx install game-of-cards`, then `goc install` inside any repo.

          ## How it works

          The agent translates plain-English intent into card operations through skills (markdown protocols). The CLI `goc` implements the operations. Cards are markdown directories under `deck/` with frontmatter, an append-only log, and a Definition-of-Done checklist the CLI refuses to close while any box is unchecked. A card's `human_gate` field can park it waiting on a human; agents resume autonomously when the gate is lowered.

          ## Documents

          - https://game-of-cards.com/index.md — full README
          - https://game-of-cards.com/goc.md — CLI reference
          - https://game-of-cards.com/ABOUT.md — methodology context, why the name, where it fits

          ## Source

          https://github.com/zauberzeug/game-of-cards
          """.replace("          ", ""))

          (out / "_config.yml").write_text(
              "title: Game of Cards\n"
              "description: Turn work into durable, inspectable cards that humans and LLMs can collaborate on.\n"
              "theme: jekyll-theme-cayman\n"
          )
          (out / "CNAME").write_text("game-of-cards.com\n")

          # Cayman's default layout pulls in _includes/head_custom.html;
          # we use it for an inline SVG-data-URL favicon (no asset file
          # needed). The joker emoji ties to the project name and renders
          # legibly at favicon sizes on every modern browser. The custom
          # site/index.html is a separate document — it sets its own head
          # and is unaffected by this include.
          includes = out / "_includes"
          includes.mkdir(exist_ok=True)
          favicon_svg = (
              "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>"
              "<text y='.9em' font-size='90'>🃏</text></svg>"
          )
          (includes / "head_custom.html").write_text(
              f'<link rel="icon" href="data:image/svg+xml,{favicon_svg}">\n'
          )

          # Custom home page — overrides any Jekyll-rendered index at "/".
          # site/ is copied through verbatim; files without front matter
          # are passed through by Jekyll as static assets.
          if Path("site").is_dir():
              for src in Path("site").rglob("*"):
                  if src.is_file():
                      dst = out / src.relative_to("site")
                      dst.parent.mkdir(parents=True, exist_ok=True)
                      shutil.copy(src, dst)

          # Repo-level assets/ — copied to /assets/ on the deployed site.
          # The custom home page references /assets/game-of-cards-dark.png
          # and /assets/how-it-works-dark.png; goc.md and ABOUT.md may
          # reference the light variants and SVG/excalidraw sources.
          # Per-file copy with not-exists guard so any future site/assets/
          # overrides are preserved.
          if Path("assets").is_dir():
              dst_assets = out / "assets"
              dst_assets.mkdir(exist_ok=True)
              for src in Path("assets").rglob("*"):
                  if src.is_file():
                      dst = dst_assets / src.relative_to("assets")
                      if not dst.exists():
                          dst.parent.mkdir(parents=True, exist_ok=True)
                          shutil.copy(src, dst)
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./_pages
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
