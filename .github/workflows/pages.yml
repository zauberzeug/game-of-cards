# Pages deployment — renders README.md, goc.md, and ABOUT.md as the site
# at game-of-cards.com, AND publishes raw markdown mirrors at fixed paths
# so LLMs can fetch the same content as plain text/markdown.
#
# Three source files are the single source of truth:
#   README.md           → /              (rendered HTML for humans)
#                       → /index.md      (raw markdown for LLMs)
#                       → /README.md     (raw mirror at conventional name)
#   goc.md              → /goc/          (rendered)
#                       → /goc.md        (raw)
#   ABOUT.md            → /about/        (rendered)
#                       → /ABOUT.md      (raw)
#
# A curated /llms.txt (llmstxt.org convention) gives crawlers a terse
# summary plus pointers to the raw documents.
#
# Pipeline (single Python step, then Jekyll):
#   1. The Python step writes everything Jekyll needs into _pages/:
#      - Rendered sources (home.md, goc-page.md, about-page.md) with
#        front matter, permalinks, H1 stripped, repo-relative markdown
#        links rewritten to site paths or absolute GitHub blob URLs.
#      - Raw mirrors (index.md, README.md, goc.md, ABOUT.md, llms.txt)
#        with NO front matter — Jekyll treats files without front matter
#        as static assets and copies them through verbatim.
#      - assets/ copied so the comic and how-it-works diagram resolve
#        identically on GitHub and on the rendered site.
#   2. Jekyll builds _pages/ → _site/ via jekyll-theme-cayman (mobile-
#      responsive, CSS-only — no JS components, so the rendered HTML
#      stays scrapable).
#   3. upload-pages-artifact ships _site/ untouched.
#
# Why a single pre-Jekyll synthesis step (no post-build step):
# `actions/jekyll-build-pages` runs Jekyll in a Docker container as a
# different UID, so a host-runner step writing into _site/ after the
# build hits "Permission denied". Putting the raw mirrors into the
# Jekyll source instead lets the container do all the writes, and
# Jekyll's pass-through rule for front-matter-less files preserves
# them byte-for-byte at the requested URL.
#
# Security: only `github.repository` is interpolated into a run: command,
# and it's indirected through env: per the safe-injection pattern. No
# attacker-controlled inputs are used.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - README.md
      - goc.md
      - ABOUT.md
      - assets/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Synthesize Jekyll site
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import os
          import re
          import shutil
          from pathlib import Path

          repo = os.environ["REPO"]
          base = f"https://github.com/{repo}/blob/main"
          out = Path("_pages")
          out.mkdir(exist_ok=True)

          def rewrite_links(text: str) -> str:
              rules = [
                  (r"\]\(README\.md\)", "](/)"),
                  (r"\]\(goc\.md\)", "](/goc/)"),
                  (r"\]\(ABOUT\.md\)", "](/about/)"),
                  (r"\]\(AGENTS\.md\)", f"]({base}/AGENTS.md)"),
                  (r"\]\(LICENSE\)", f"]({base}/LICENSE)"),
                  (r"\]\((goc/[^)]+|\.game-of-cards/[^)]+|deck/[^)]+)\)",
                   f"]({base}/\\1)"),
              ]
              for pat, repl in rules:
                  text = re.sub(pat, repl, text)
              return text

          def strip_first_h1(text: str) -> str:
              lines = text.splitlines(keepends=True)
              for i, line in enumerate(lines):
                  if line.startswith("# "):
                      del lines[i]
                      if i < len(lines) and lines[i].strip() == "":
                          del lines[i]
                      break
              return "".join(lines)

          def render_page(src: str, out_name: str, title: str,
                          permalink: str, description: str = "") -> None:
              body = rewrite_links(strip_first_h1(Path(src).read_text()))
              front = ["---", "layout: default", f"title: {title}",
                      f"permalink: {permalink}"]
              if description:
                  front.append(f"description: {description}")
              front.append("---")
              (out / out_name).write_text("\n".join(front) + "\n" + body)

          # Rendered HTML pages — Jekyll processes these via permalink.
          # The source filenames don't appear in URLs (permalink wins),
          # so they're chosen to NOT collide with the raw mirrors below.
          render_page(
              "README.md", "home.md",
              "Game of Cards", "/",
              "Agile in the age of AI agents — repo-native cards humans and AI agents share.",
          )
          render_page(
              "goc.md", "goc-page.md",
              "goc — the Game of Cards CLI", "/goc/",
          )
          render_page(
              "ABOUT.md", "about-page.md",
              "Background — context for Game of Cards", "/about/",
          )

          # Raw markdown mirrors — no front matter means Jekyll treats
          # them as static files and copies them through unchanged.
          (out / "index.md").write_text(Path("README.md").read_text())
          (out / "README.md").write_text(Path("README.md").read_text())
          (out / "goc.md").write_text(Path("goc.md").read_text())
          (out / "ABOUT.md").write_text(Path("ABOUT.md").read_text())

          # Curated llms.txt — terse summary + pointers to the raw
          # documents above (llmstxt.org convention).
          (out / "llms.txt").write_text("""# Game of Cards

          > Agile in the age of AI agents: a repo-native methodology for turning work into durable, inspectable cards that humans and coding agents share.

          ## Install

          Bootstrap via the PyPI package `game-of-cards`. The simplest path is to ask your coding agent in any repo:

          > Install Game of Cards (https://github.com/zauberzeug/game-of-cards) in this repo, then create a first card for the next small improvement.

          Manual: `uv tool install game-of-cards` or `pipx install game-of-cards`, then `goc install` inside any repo.

          ## How it works

          The agent translates plain-English intent into card operations through skills (markdown protocols). The CLI `goc` implements the operations. Cards are markdown directories under `deck/` with frontmatter, an append-only log, and a Definition-of-Done checklist the CLI refuses to close while any box is unchecked. A card's `human_gate` field can park it waiting on a human; agents resume autonomously when the gate is lowered.

          ## Documents

          - https://game-of-cards.com/index.md — full README
          - https://game-of-cards.com/goc.md — CLI reference
          - https://game-of-cards.com/ABOUT.md — methodology context, why the name, where it fits

          ## Source

          https://github.com/zauberzeug/game-of-cards
          """.replace("          ", ""))

          (out / "_config.yml").write_text(
              "title: Game of Cards\n"
              "description: Agile in the age of AI agents — repo-native cards humans and AI agents share.\n"
              "theme: jekyll-theme-cayman\n"
          )
          (out / "CNAME").write_text("game-of-cards.com\n")

          if Path("assets").is_dir():
              shutil.copytree("assets", out / "assets")
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./_pages
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
