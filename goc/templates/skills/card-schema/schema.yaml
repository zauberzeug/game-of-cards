schema_version: 3
required_fields:
  - title
  - status
  - contribution
  - created
  - human_gate
  - definition_of_done
optional_fields:
  - summary
  - stage
  - closed_at
  - advances
  - advanced_by
  - tags
title_pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
status_values:        [open, active, blocked, done, disproved, superseded]
stage_values:         [null, alpha, beta, stable]
contribution_values:  [high, medium, low]
human_gate_values: [none, decision, session]
human_gate_default: decision
canonical_tags:
  - bug
  - plasticity
  - fchannel
  - alpha-channel
  - prediction
  - axiom
  - documentation
  - test
  - api-contract
  - silent-state-corruption
  - literature-drift
  - meta-fix
  - boundary-state
  - default-config
  - regime-coverage
  - infra
  - sweep-deferred
  - unverified
  - epic
  - story
  - framework
  - research
  - pong
  - nrem
